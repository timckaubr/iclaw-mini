<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iLatex v0.9 - Persistence & Dark Mode</title>
    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/stex/stex.min.js"></script>
    <!-- MathJax Configuration -->
    <script>
        window.MathJax = {
            loader: {load: ['[tex]/mhchem', '[tex]/ams']},
            tex: {
                packages: {'[+]': ['mhchem', 'ams']},
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                tags: 'ams'
            },
            options: {
                ignoreHtmlClass: 'tex2jax_ignore',
                processHtmlClass: 'tex2jax_process'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --bg-body: #fdfdfd;
            --bg-toolbar: #f1f3f5;
            --bg-editor: #ffffff;
            --bg-preview: #ffffff;
            --text-main: #212529;
            --border-color: #dee2e6;
            --btn-bg: #ffffff;
            --btn-text: #495057;
            --btn-hover: #e9ecef;
        }

        [data-theme="dark"] {
            --bg-body: #1a1a1a;
            --bg-toolbar: #2d2d2d;
            --bg-editor: #282a36; /* Match Dracula */
            --bg-preview: #ffffff; /* Keep preview white for "paper" feel? Or dark? Let's go white paper for now. */
            --text-main: #e0e0e0;
            --border-color: #404040;
            --btn-bg: #3d3d3d;
            --btn-text: #e0e0e0;
            --btn-hover: #4d4d4d;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; overflow: hidden; background: var(--bg-body); color: var(--text-main); }
        
        #toolbar { background: var(--bg-toolbar); padding: 8px; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid var(--border-color); }
        .toolbar-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .toolbar-group { display: flex; gap: 4px; border-right: 1px solid var(--border-color); padding-right: 8px; margin-right: 4px; }
        .toolbar-group:last-child { border-right: none; }
        
        button { 
            background: var(--btn-bg); color: var(--btn-text); border: 1px solid var(--border-color); padding: 6px 12px; height: 34px;
            border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center;
        }
        button:hover { background: var(--btn-hover); border-color: #adb5bd; }
        button.primary { background: #007aff; color: white; border-color: #007aff; }
        button.primary:hover { background: #0063cc; }
        button.sym { font-family: serif; font-size: 16px; min-width: 36px; }
        
        #container { display: flex; height: calc(100vh - 130px); width: 100vw; }
        #editor-container { width: 50%; height: 100%; border-right: 1px solid var(--border-color); }
        .CodeMirror { height: 100%; font-size: 15px; }
        
        #preview-container { width: 50%; height: 100%; background: white; overflow-y: auto; padding: 60px; box-sizing: border-box; }
        #preview { 
            color: #000; 
            line-height: 1.6; 
            font-family: "Times New Roman", Times, serif; 
            font-size: 18px;
            text-align: justify;
        }
        
        /* LaTeX Styling */
        .latex-section { font-size: 1.4em; font-weight: bold; margin-top: 1.2em; display: block; color: #000; margin-bottom: 0.6em; }
        .latex-center { text-align: center; display: block; margin: 1.2em 0; }
        .latex-bold { font-weight: bold; }
        .latex-huge { font-size: 2.2em; display: block; margin-bottom: 0.8em; line-height: 1.2; text-align: center; }
        .latex-list { margin-left: 2em; margin-bottom: 1em; }
        .latex-list-item { display: list-item; list-style-type: disc; margin-bottom: 0.3em; }
        .latex-list-enum { display: list-item; list-style-type: decimal; margin-bottom: 0.3em; }
        p { margin-bottom: 1.2em; margin-top: 0; }

        #status-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 20px; 
            background: var(--bg-toolbar); border-top: 1px solid var(--border-color);
            font-size: 11px; padding: 2px 10px; display: flex; justify-content: space-between; align-items: center;
            color: var(--btn-text);
        }

        /* Print Styles */
        @media print {
            body * { visibility: hidden; }
            #preview-container, #preview-container * { visibility: visible; }
            #preview-container { 
                position: absolute; left: 0; top: 0; width: 100%; height: auto; 
                padding: 0; margin: 0; border: none; overflow: visible;
            }
        }
    </style>
</head>
<body data-theme="light">

<div id="toolbar">
    <div class="toolbar-row">
        <div class="toolbar-group">
            <button class="primary" onclick="triggerOpen()">Open</button>
            <button class="primary" onclick="saveFile()">Save .tex</button>
            <button onclick="exportPDF()">Export PDF</button>
            <button onclick="toggleTheme()" id="theme-btn">🌙 Dark</button>
            <input type="file" id="fileInput" style="display:none" accept=".tex,.txt" onchange="handleFile(event)">
        </div>
        <div class="toolbar-group">
            <button onclick="ins('\\section{', '}')">Section</button>
            <button onclick="ins('\\textbf{', '}')">Bold</button>
            <button onclick="ins('\\centerline{', '}')">Center</button>
            <button onclick="ins('\\Huge ', '')">Huge</button>
        </div>
        <div class="toolbar-group">
            <button onclick="ins('\\begin{itemize}\n  \\item ', '\n\\end{itemize}')">List</button>
            <button onclick="ins('$', '$')">Math $</button>
            <button onclick="ins('\\frac{', '}{}')">Frac</button>
            <button onclick="ins('\\sqrt{', '}')">Sqrt</button>
            <button onclick="ins('\\int_{', '}^{} ' )">Int</button>
        </div>
    </div>
    <div class="toolbar-row">
        <button class="sym" onclick="ins('\\alpha')">α</button>
        <button class="sym" onclick="ins('\\beta')">β</button>
        <button class="sym" onclick="ins('\\gamma')">γ</button>
        <button class="sym" onclick="ins('\\delta')">δ</button>
        <button class="sym" onclick="ins('\\theta')">θ</button>
        <button class="sym" onclick="ins('\\lambda')">λ</button>
        <button class="sym" onclick="ins('\\pi')">π</button>
        <button class="sym" onclick="ins('\\sigma')">σ</button>
        <button class="sym" onclick="ins('\\Omega')">Ω</button>
        <button class="sym" onclick="ins('\\infty')">∞</button>
        <button class="sym" onclick="ins('\\pm')">±</button>
        <button class="sym" onclick="ins('\\neq')">≠</button>
    </div>
</div>

<div id="container">
    <div id="editor-container"><textarea id="editor"></textarea></div>
    <div id="preview-container" class="tex2jax_process"><div id="preview"></div></div>
</div>

<div id="status-bar">
    <span id="save-status">Ready</span>
    <span>iLatex v0.9 | Master Au Edition</span>
</div>

<script>
    const defaultContent = `\\Huge \\textbf{iLatex v0.9}

\\section{Welcome}
This project now supports **auto-save** and **dark mode**. 
Your progress is saved locally in your browser.

\\section{Lists}
\\begin{itemize}
  \\item First item
  \\item Second item with $E=mc^2$
\\end{itemize}

\\section{Mathematics}
$$\\int_{a}^{b} f(x) dx = F(b) - F(a)$$

\\section{Features}
\\begin{itemize}
  \\item Auto-saves every change
  \\item Remembers your theme preference
  \\item Enhanced list rendering
\\end{itemize}`;

    // Initialization
    const savedContent = localStorage.getItem('ilatex_content');
    const savedTheme = localStorage.getItem('ilatex_theme') || 'light';
    
    document.body.setAttribute('data-theme', savedTheme);
    
    const editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
        mode: 'stex',
        theme: savedTheme === 'dark' ? 'dracula' : 'default',
        lineNumbers: true,
        lineWrapping: true,
        viewportMargin: Infinity
    });

    editor.setValue(savedContent || defaultContent);

    // --- Theme Logic ---
    function toggleTheme() {
        const current = document.body.getAttribute('data-theme');
        const next = current === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', next);
        localStorage.setItem('ilatex_theme', next);
        editor.setOption('theme', next === 'dark' ? 'dracula' : 'default');
        document.getElementById('theme-btn').innerText = next === 'light' ? '🌙 Dark' : '☀️ Light';
    }
    
    if(savedTheme === 'dark') document.getElementById('theme-btn').innerText = '☀️ Light';

    // --- File Tools ---
    function triggerOpen() {
        document.getElementById('fileInput').click();
    }

    function handleFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            editor.setValue(e.target.result);
        };
        reader.readAsText(file);
    }

    function saveFile() {
        const text = editor.getValue();
        const blob = new Blob([text], { type: 'text/plain' });
        const anchor = document.createElement('a');
        anchor.download = 'document.tex';
        anchor.href = window.URL.createObjectURL(blob);
        anchor.click();
        window.URL.revokeObjectURL(anchor.href);
    }

    function exportPDF() {
        window.print();
    }

    // --- Editor Logic ---
    function ins(pre, post = '') {
        const selection = editor.getSelection();
        editor.replaceSelection(pre + selection + post);
        editor.focus();
    }

    function updatePreview() {
        let content = editor.getValue();
        
        // Save to localStorage
        localStorage.setItem('ilatex_content', content);
        document.getElementById('save-status').innerText = 'Saved ' + new Date().toLocaleTimeString();
        
        // 1. Math Guard
        const mathBlocks = [];
        const mathRegex = /(\$\$[\s\S]*?\$\$|\\\[[\s\S]*?\\\]|\$[^$]*?\$|\\\(.*?\\\)|\\begin\{([a-zA-Z*]+)\}[\s\S]*?\\end\{\2\})/g;
        
        content = content.replace(mathRegex, (match) => {
            // Special handling for environments we want to treat as math (like cases/matrix)
            // But itemize/enumerate we handle as HTML
            if(match.includes('{itemize}') || match.includes('{enumerate}')) return match; 
            
            mathBlocks.push(match);
            return `__MATH_GUARD_${mathBlocks.length - 1}__`;
        });

        // 2. LaTeX to HTML mapping
        content = content.replace(/\\section\{((?:[^{}]|\{[^{}]*\})*)\}/g, '<span class="latex-section">$1</span>');
        content = content.replace(/\\centerline\{((?:[^{}]|\{[^{}]*\})*)\}/g, '<div class="latex-center">$1</div>');
        content = content.replace(/\\textbf\{((?:[^{}]|\{[^{}]*\})*)\}/g, '<span class="latex-bold">$1</span>');
        content = content.replace(/\\Huge\s+([^\n]+)/g, '<span class="latex-huge">$1</span>');

        // 3. Lists
        content = content.replace(/\\begin\{itemize\}([\s\S]*?)\\end\{itemize\}/g, (m, inner) => {
            const items = inner.trim().split('\\item').filter(i => i.trim());
            return `<div class="latex-list">${items.map(i => `<div class="latex-list-item">${i.trim()}</div>`).join('')}</div>`;
        });
        content = content.replace(/\\begin\{enumerate\}([\s\S]*?)\\end\{enumerate\}/g, (m, inner) => {
            const items = inner.trim().split('\\item').filter(i => i.trim());
            return `<div class="latex-list">${items.map((i, idx) => `<div class="latex-list-enum">${i.trim()}</div>`).join('')}</div>`;
        });
        
        // 4. Newline Handling
        content = content.replace(/\\\\/g, '<br>'); 
        
        let paragraphs = content.split(/\n\s*\n/);
        paragraphs = paragraphs.map(p => {
            let cleaned = p.trim().replace(/\n/g, ' ');
            if (cleaned.length === 0) return '';
            if (cleaned.startsWith('<div') || cleaned.startsWith('<span class="latex-huge"')) return cleaned;
            return `<p>${cleaned}</p>`;
        });
        
        content = paragraphs.join('');

        // 5. Restore Math
        content = content.replace(/__MATH_GUARD_(\d+)__/g, (_, id) => mathBlocks[id]);

        const preview = document.getElementById('preview');
        preview.innerHTML = content;

        if (window.MathJax && window.MathJax.typesetPromise) {
            window.MathJax.typesetPromise([preview]).catch((err) => console.log('MathJax error:', err));
        }
    }

    editor.on('change', () => {
        document.getElementById('save-status').innerText = 'Typing...';
        clearTimeout(window.renderTimer);
        window.renderTimer = setTimeout(updatePreview, 600);
    });

    window.addEventListener('load', () => {
        setTimeout(updatePreview, 500);
    });
</script>

</body>
</html>
