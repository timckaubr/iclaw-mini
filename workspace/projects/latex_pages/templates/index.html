<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaTeX to Word Converter</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 800px; 
            margin: 40px auto; 
            padding: 20px; 
            background-color: #f8f9fa;
            color: #333;
        }
        h1 { color: #2c3e50; text-align: center; }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #drop-zone {
            border: 2px dashed #007bff;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            background-color: #f0f7ff;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 20px;
        }
        #drop-zone.dragover {
            background-color: #e1efff;
            border-color: #0056b3;
            transform: scale(1.02);
        }
        #file-info {
            margin-top: 10px;
            font-weight: bold;
            color: #28a745;
        }
        textarea { 
            width: 100%; 
            height: 200px; 
            margin: 20px 0; 
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
            box-sizing: border-box;
            resize: vertical;
        }
        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }
        .divider:before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #ddd;
            z-index: 1;
        }
        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            z-index: 2;
            color: #888;
            font-size: 0.9em;
        }
        button { 
            display: block;
            width: 100%;
            padding: 12px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer; 
            transition: background 0.2s;
        }
        button:hover { background-color: #0056b3; }
        #file-input { display: none; }
        .help-text {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LaTeX to Word Converter</h1>
        
        <form id="upload-form" action="/convert" method="post" enctype="multipart/form-data">
            <div id="drop-zone">
                <p>Drag & Drop your .tex file here</p>
                <p>or click to browse</p>
                <input type="file" name="file" id="file-input" accept=".tex">
                <div id="file-info"></div>
            </div>

            <div class="divider"><span>OR PASTE CODE BELOW</span></div>

            <p class="help-text">You can paste raw math like <code>x^2 + y^2 = z^2</code> or full LaTeX code.</p>
            <textarea name="latex_code" placeholder="Example: \frac{-b \pm \sqrt{b^2-4ac}}{2a}"></textarea>
            
            <button type="submit">Convert to Word (.docx)</button>
        </form>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileInfo = document.getElementById('file-info');

        // Click to open file dialog
        dropZone.addEventListener('click', () => fileInput.click());

        // Highlight drop zone
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            }, false);
        });

        // Handle dropped files
        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            fileInput.files = files;
            handleFiles(files);
        });

        // Handle file selection
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            if (files.length > 0) {
                fileInfo.textContent = `Selected: ${files[0].name}`;
            }
        }
    </script>
</body>
</html>
